server:
  port: 80

spring:
  ai:
    mistralai:
      api-key:
    vectorstore:
      pinecone:
        apiKey: demo
        index-name: spring-ai
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: llama2
      embedding:
        options:
          model: nomic-embed-text
      init:
        pull-model-strategy: when_missing
    chat:
      client:
        enabled: false
    openai:
      api-key: demo
      embedding:
        options:
          model: text-embedding-3-small

azure:
  application-insights:
    instrumentation-key: ${AZURE_APP_INSIGHTS_KEY}
logging:
  level:
    root: INFO
    com.agilesolutions.chatbot: DEBUG


management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  metrics:
    export:
      prometheus:
        enabled: true