server:
  port: 80

spring:
  ai:
    mistralai:
      api-key: b06684e5-d7b4-4647-8bde-7d3721fecf2b
    vectorstore:
      chroma:
        initialize-schema: true
      pinecone:
        apiKey: demo
        index-name: spring-ai
    ollama:
      embedding:
        options:
          model: nomic-embed-text
      init:
        chat:
          include: false
        pull-model-strategy: WHEN_MISSING
    chat:
      client:
        enabled: false
    openai:
      api-key: demo
      embedding:
        options:
          model: text-embedding-3-small

azure:
  application-insights:
    instrumentation-key: ${AZURE_APP_INSIGHTS_KEY}
logging:
  level:
    root: INFO
    com.agilesolutions.chatbot: DEBUG


management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  metrics:
    export:
      prometheus:
        enabled: true