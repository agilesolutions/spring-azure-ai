server:
  port: 80

azure:
  openai:
    api:
      key: <COPY KEY FROM AZURE PORTAL>
      endpoint: https://myendpoint.openai.azure.com/
      deployment:
        model:
          id: gpt-40
  application-insights:
    instrumentation-key: ${AZURE_APP_INSIGHTS_KEY}
logging:
  level:
    root: INFO
    com.agilesolutions.chatbot: DEBUG


management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  metrics:
    export:
      prometheus:
        enabled: true